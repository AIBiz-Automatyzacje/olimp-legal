<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olimp — Privacy Policy</title>
  <style>
    :root {
      --navy: #1B263D;
      --gold: #D4A12E;
      --cream: #F5F1E8;
      --stone: #6B6356;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      color: var(--stone);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link {
      display: block;
      padding: 16px 24px;
      background: var(--navy);
      color: var(--cream);
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .link:hover { background: var(--gold); color: var(--navy); }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--stone);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Olimp 🏛️</h1>
    <p class="tagline">Privacy Policy</p>
    <h2>Wybierz język / Select language</h2>
    <div class="links">
      <a class="link" href="pl.html">🇵🇱 Polski</a>
      <a class="link" href="en.html">🇬🇧 English</a>
    </div>
    <p class="footer">Last updated: 2026-05-17</p>
  </div>
</body>
</html>
